services:
  redis:
    image: redis/redis-stack:latest
    container_name: wooffer-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    restart: always

  mongodb:
    image: mongo:latest
    container_name: wooffer-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  redis-data:
  mongo-data: